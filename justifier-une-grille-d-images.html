<!DOCTYPE html><html lang="fr-FR"><head><title>Justifier une grille d’images</title>
<meta name="viewport" content="width=device-width">
<link rel="stylesheet" href="assets/f324e4d749e986f27deebbfe7a64fc14.css">
<link rel="stylesheet" href="assets/04fdfe2323cd71d87cdca4d163df3e5f.css">
</head><body><h1>Justifier une grille d’images</h1>
<p></p>
<style>
    ul {
        display: flex;
        flex-wrap: wrap;
        list-style: none;
    }
    li {
        margin: 8px;
        max-width: max-content;
    }
    img {
        width: 100%;
    }
</style>
<ul>
    <li style="flex: 400 1 400px;"><img src="https://placekitten.com/800/800" alt=""></li>

    <li style="flex: 800 1 800px;"><img src="https://placekitten.com/1600/800" alt=""></li>
    <li style="flex: 200 1 200px;"><img src="https://placekitten.com/400/800" alt=""></li>
</ul>

</body></html>
